<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM AI Assistant</title>
<style>
  :root {
    --blue: #1A3A5C;
    --blue-mid: #2E5F8A;
    --blue-light: #E8F0F8;
    --accent: #0F7EC4;
    --green: #1A7A4A;
    --green-bg: #E8F5EE;
    --amber: #8A5F00;
    --amber-bg: #FFF4DC;
    --red: #A02020;
    --red-bg: #FEF0F0;
    --slate: #4A6080;
    --slate-bg: #EFF4F9;
    --border: #D0DCE8;
    --text: #1A2A3A;
    --text-muted: #6A7E90;
    --bg: #F2F6FA;
    --surface: #FFFFFF;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 3rem;
  }
  .topbar {
    background: var(--blue);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-icon svg { width: 18px; height: 18px; fill: #fff; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #fff; }
  .topbar-sub { font-size: 11px; color: rgba(255,255,255,0.6); }
  .live-dot-wrap { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.7); }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ADE80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #main-app { max-width: 480px; margin: 0 auto; padding: 1.25rem; }

  .search-wrap { position: relative; margin-bottom: 1.25rem; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-icon svg { width: 17px; height: 17px; }
  #search {
    width: 100%;
    padding: 13px 13px 13px 40px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  #search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,126,196,0.1); }
  #search::placeholder { color: var(--text-muted); }

  #dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    overflow: hidden; display: none; z-index: 50;
  }
  #dropdown.show { display: block; }
  .dd-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover { background: var(--blue-light); }
  .dd-avatar-sm {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--blue-light); color: var(--blue-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .dd-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .dd-company { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  .loading-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 14px; display: none; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .scheda { display: none; }
  .scheda.show { display: block; }

  .client-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .avatar {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 600; flex-shrink: 0;
  }
  .client-name { font-size: 17px; font-weight: 600; color: var(--text); }
  .client-company { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .client-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .badge-pos { background: var(--green-bg); color: var(--green); }
  .badge-neu { background: var(--amber-bg); color: var(--amber); }
  .badge-att { background: var(--slate-bg); color: var(--slate); }
  .badge-ris { background: var(--red-bg); color: var(--red); }
  .last-meeting { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .last-meeting svg { width: 13px; height: 13px; }

  .section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.1rem 1.25rem;
    margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .sec-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .sec-head svg { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; }
  .sec-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .sec-body { font-size: 14px; color: var(--text); line-height: 1.65; }

  .item-list { list-style: none; }
  .item-list li { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); line-height: 1.5; }
  .item-list li:last-child { border-bottom: none; padding-bottom: 0; }
  .item-bullet { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; margin-top: 7px; }

  .action-row { display: flex; align-items: flex-start; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .action-row:last-child { border-bottom: none; padding-bottom: 0; }
  .action-check { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 2px; }
  .action-label { font-size: 14px; color: var(--text); line-height: 1.5; flex: 1; }
  .action-due { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 3px; }
  .action-due svg { width: 11px; height: 11px; }
  .no-data { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 4px 0; }

  .change-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 14px;
    font-size: 13px; color: var(--text-muted); cursor: pointer;
    margin-bottom: 1.25rem; width: 100%; justify-content: center;
    transition: background 0.1s;
  }
  .change-btn:hover { background: var(--blue-light); color: var(--blue-mid); }
  .change-btn svg { width: 15px; height: 15px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div>
      <div class="topbar-title">CRM AI Assistant</div>
      <div class="topbar-sub">Scheda pre-incontro</div>
    </div>
  </div>
  <div class="live-dot-wrap">
    <div class="live-dot"></div>
    <span id="connection-status">Connessione...</span>
  </div>
</div>

<div id="main-app">
  <div class="search-wrap">
    <div class="search-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <input type="text" id="search" placeholder="Cerca per nome o azienda…" autocomplete="off" />
    <div id="dropdown"></div>
  </div>

  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <p>Cerca un cliente per<br>aprire la scheda pre-incontro</p>
  </div>

  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    Caricamento scheda...
  </div>

  <div class="scheda" id="scheda"></div>
</div>

<script>
const TOKEN = "patdA1uCAKVfuj1uB.f2ce0ae9ca5f983013fa2d73712110bb203da681fe882d4f7ae61107cc5da51b";
const BASE_ID = "appJC0nI2jmOlnX2x";
const API = "https://api.airtable.com/v0";
const H = { Authorization: "Bearer " + TOKEN };

let allClienti = [];

function initials(nome) {
  return (nome||"?").split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();
}
function sentimentClass(s) {
  return {"Positivo":"badge-pos","Neutro":"badge-neu","In attesa":"badge-att","A rischio":"badge-ris"}[s]||"badge-neu";
}
function fmtDate(d) {
  if (!d) return null;
  return new Date(d).toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"});
}
function parseLines(t) {
  return (t||"").split("\n").map(l=>l.replace(/^[-•*\d.]\s*/,"").trim()).filter(Boolean);
}

async function fetchClienti() {
  const p = new URLSearchParams();
  ["Nome","Azienda","Sentiment attuale","Ultimo incontro","Obiettivi","Vincoli"].forEach(f=>p.append("fields[]",f));
  const r = await fetch(`${API}/${BASE_ID}/Clienti?${p}`,{headers:H});
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).records || [];
}
async function fetchIncontro(id) {
  const p = new URLSearchParams();
  ["Cliente","Data","Sintesi","Prossime azioni"].forEach(f=>p.append("fields[]",f));
  p.set("sort[0][field]","Data"); p.set("sort[0][direction]","desc"); p.set("maxRecords","1");
  p.set("filterByFormula",`FIND("${id}",ARRAYJOIN(Cliente))`);
  const r = await fetch(`${API}/${BASE_ID}/Incontri?${p}`,{headers:H});
  return ((await r.json()).records||[])[0]||null;
}
async function fetchAzioni(id) {
  const p = new URLSearchParams();
  ["Descrizione","Scadenza","Completata"].forEach(f=>p.append("fields[]",f));
  p.set("filterByFormula",`AND(FIND("${id}",ARRAYJOIN(Cliente)),NOT(Completata))`);
  const r = await fetch(`${API}/${BASE_ID}/Azioni?${p}`,{headers:H});
  return (await r.json()).records||[];
}

function renderScheda(cliente, incontro, azioni) {
  const f = cliente.fields;
  const nome = f["Nome"]||"";
  const azienda = f["Azienda"]||"";
  const sentiment = f["Sentiment attuale"]?.name||"Neutro";
  const obiettivi = f["Obiettivi"]||"";
  const vincoli = f["Vincoli"]||"";
  const ultimoIncontro = incontro ? fmtDate(incontro.fields["Data"]) : null;
  const sintesi = incontro?.fields["Sintesi"]||null;
  const prossime = parseLines(incontro?.fields["Prossime azioni"]||"");

  const obiettiviHTML = [
    obiettivi ? `<strong>Obiettivi:</strong> ${obiettivi}` : null,
    vincoli   ? `<strong>Vincoli:</strong> ${vincoli}` : null
  ].filter(Boolean).join("<br><br>") || '<span class="no-data">Nessuna informazione disponibile</span>';

  const prossimeHTML = prossime.length
    ? prossime.map(a=>`<li><div class="item-bullet"></div><span>${a}</span></li>`).join("")
    : `<li><span class="no-data">Nessuna azione dal precedente incontro</span></li>`;

  const azioniHTML = azioni.length
    ? azioni.map(a=>{
        const scad = a.fields["Scadenza"] ? fmtDate(a.fields["Scadenza"]) : null;
        return `<div class="action-row">
          <div class="action-check"></div>
          <div>
            <div class="action-label">${a.fields["Descrizione"]||""}</div>
            ${scad?`<div class="action-due"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${scad}</div>`:""}
          </div>
        </div>`;
      }).join("")
    : `<div class="no-data">Nessuna azione in sospeso</div>`;

  const icon = {
    user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
    notes: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    list: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
    check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
    cal: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    back: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>`
  };

  document.getElementById("scheda").innerHTML = `
    <button class="change-btn" onclick="resetSearch()">${icon.back} Cerca un altro cliente</button>

    <div class="client-header">
      <div class="avatar">${initials(nome)}</div>
      <div>
        <div class="client-name">${nome}</div>
        <div class="client-company">${azienda}</div>
        <div class="client-meta">
          <span class="badge ${sentimentClass(sentiment)}">${sentiment}</span>
          ${ultimoIncontro?`<span class="last-meeting">${icon.cal} Ultimo incontro: ${ultimoIncontro}</span>`:""}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-head">${icon.user}<span class="sec-title">Chi è il cliente</span></div>
      <div class="sec-body">${obiettiviHTML}</div>
    </div>

    <div class="section">
      <div class="sec-head">${icon.notes}<span class="sec-title">Ultimo incontro — cosa è emerso</span></div>
      <div class="sec-body">${sintesi||'<span class="no-data">Nessun incontro registrato</span>'}</div>
    </div>

    <div class="section">
      <div class="sec-head">${icon.list}<span class="sec-title">Prossime azioni dall'ultimo incontro</span></div>
      <ul class="item-list">${prossimeHTML}</ul>
    </div>

    <div class="section">
      <div class="sec-head">${icon.check}<span class="sec-title">Azioni in sospeso</span></div>
      ${azioniHTML}
    </div>`;

  document.getElementById("scheda").classList.add("show");
}

function resetSearch() {
  document.getElementById("search").value = "";
  document.getElementById("scheda").classList.remove("show");
  document.getElementById("scheda").innerHTML = "";
  document.getElementById("empty-state").style.display = "block";
  document.getElementById("search").focus();
}

function showDropdown(items) {
  const dd = document.getElementById("dropdown");
  if (!items.length) { dd.classList.remove("show"); return; }
  dd.innerHTML = items.map(c=>`
    <div class="dd-item" data-id="${c.id}" tabindex="0">
      <div class="dd-avatar-sm">${initials(c.fields["Nome"]||"")}</div>
      <div>
        <div class="dd-name">${c.fields["Nome"]||""}</div>
        <div class="dd-company">${c.fields["Azienda"]||""}</div>
      </div>
    </div>`).join("");
  dd.classList.add("show");
  dd.querySelectorAll(".dd-item").forEach(el=>{
    el.addEventListener("click",()=>selectCliente(el.dataset.id));
    el.addEventListener("keydown",e=>{if(e.key==="Enter")selectCliente(el.dataset.id);});
  });
}

async function selectCliente(id) {
  const cliente = allClienti.find(c=>c.id===id);
  if (!cliente) return;
  document.getElementById("search").value = cliente.fields["Nome"]||"";
  document.getElementById("dropdown").classList.remove("show");
  document.getElementById("empty-state").style.display = "none";
  document.getElementById("scheda").classList.remove("show");
  document.getElementById("loading-state").style.display = "block";
  try {
    const [incontro, azioni] = await Promise.all([fetchIncontro(id), fetchAzioni(id)]);
    renderScheda(cliente, incontro, azioni);
  } catch(e) {
    document.getElementById("scheda").innerHTML = `<p style="color:#a02020;font-size:13px;padding:1rem 0">Errore nel caricamento. Riprova.</p>`;
    document.getElementById("scheda").classList.add("show");
  } finally {
    document.getElementById("loading-state").style.display = "none";
  }
}

async function init() {
  try {
    allClienti = await fetchClienti();
    document.getElementById("connection-status").textContent = `${allClienti.length} clienti`;
    const search = document.getElementById("search");
    const dropdown = document.getElementById("dropdown");
    search.addEventListener("input",()=>{
      const q = search.value.trim().toLowerCase();
      if (!q) { dropdown.classList.remove("show"); return; }
      showDropdown(allClienti.filter(c=>
        (c.fields["Nome"]||"").toLowerCase().includes(q)||
        (c.fields["Azienda"]||"").toLowerCase().includes(q)
      ));
    });
    search.addEventListener("keydown",e=>{if(e.key==="Escape"){dropdown.classList.remove("show");search.blur();}});
    document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap"))dropdown.classList.remove("show");});
  } catch(e) {
    document.getElementById("connection-status").textContent = "Errore connessione";
    document.getElementById("empty-state").innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;margin-bottom:1rem;opacity:0.4"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg><p>Errore di connessione ad Airtable.</p>`;
  }
}
init();
</script>
</body>
</html>
